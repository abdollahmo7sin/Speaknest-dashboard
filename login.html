<!DOCTYPE html>
<html dir="rtl" lang="ar">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1, shrink-to-fit=no" name="viewport" />
    <meta content="تسجيل الدخول - SpeakNest" name="description" />
    <!-- Bootstrap RTL CSS -->
    <link href="css/bootstrap.rtl.min.css" rel="stylesheet" />
    <!-- Font Awesome -->
    <link href="css/all.min.css" rel="stylesheet" />
    <!-- Base Styles -->
    <link href="css/main.css" rel="stylesheet" />
    <!-- Login Specific Styles -->
    <link href="css/login.css" rel="stylesheet" />
    <title>تسجيل الدخول | SpeakNest</title>
</head>

<body>

    <section class="login-section">
        <!-- Floating language toggle -->
        <div class="login-lang-pos">
            <a href="login-en.html" class="topbar-lang-toggle text-decoration-none">EN</a>
        </div>
        <!-- Floating shapes for background animation -->
        <div class="float-shape shape-1"></div>
        <div class="float-shape shape-2"></div>

        <div class="login-card">
            <div class="login-header">
                <a href="index.html">
                    <img src="images/logo.png" alt="SpeakNest Logo" />
                </a>
                <h2>مرحباً بك مجدداً</h2>
                <p>سجل دخولك للمتابعة إلى لوحة التحكم</p>
            </div>

            <form action="index.html" class="login-form">
                <div class="mb-4">
                    <div class="form-group-custom">
                        <label>البريد الإلكتروني</label>
                        <div class="input-wrapper-custom">
                            <span class="input-icon"><i class="fa-light fa-envelope"></i></span>
                            <input type="email" class="form-control" placeholder="example@domain.com" required>
                        </div>
                    </div>
                </div>

                <div class="mb-4">
                    <div class="form-group-custom">
                        <label>كلمة المرور</label>
                        <div class="input-wrapper-custom position-relative">
                            <span class="input-icon"><i class="fa-light fa-lock"></i></span>
                            <input type="password" class="form-control" placeholder="••••••••" required>
                            <button type="button" class="login-toggle-password">
                                <i class="fa-light fa-eye"></i>
                            </button>
                        </div>
                    </div>
                </div>

                <div class="d-flex justify-content-between align-items-center mb-4">
                    <label class="custom-checkbox">
                        <input type="checkbox">
                        <span class="checkmark"></span>
                        <span class="text">تذكرني</span>
                    </label>
                    <a href="#" class="forgot-password">نسيت كلمة المرور؟</a>
                </div>

                <button type="submit" class="btn btn-blue w-100 py-3 fz18">
                    تسجيل الدخول
                </button>

                <div class="text-center mt-5">
                    <p class="text-color opacity-75 mb-3">أو سجل دخولك بواسطة</p>
                    <div class="social-login">
                        <a href="#" class="social-btn"><i class="fa-brands fa-google"></i></a>
                        <a href="#" class="social-btn"><i class="fa-brands fa-facebook-f"></i></a>
                        <a href="#" class="social-btn"><i class="fa-brands fa-apple"></i></a>
                    </div>
                </div>

                <div class="text-center mt-4">
                    <p class="mb-0">ليس لديك حساب؟ <a href="#" class="text-red fw-bold">أنشئ حساباً جديداً</a></p>
                </div>
            </form>
        </div>
    </section>

    <!-- Scripts -->
    <script src="js/jquery.min.js"></script>
    <script src="js/bootstrap.min.js"></script>
    <script src="js/main.js"></script>

</body>

</html>
