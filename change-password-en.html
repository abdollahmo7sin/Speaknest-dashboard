        <!-- ===== CONTENT ===== -->
        <main class="dashboard-content">

            <div class="section-title-dash mb-4">Change Password</div>

            <div class="row">

                <div class="col-lg-6 offset-lg-3">
                    <div class="login-form-container register-form-container">

                        <!-- Form -->
                        <form class="login-form">

                            <!-- Password Field -->
                            <div class="login-field-group">
                                <label class="login-field-label" for="oldPassword">Enter current password</label>
                                <div class="login-input-wrapper phone-input-wrapper">
                                    <input type="password" id="oldPassword" class="login-input" placeholder="••••••"
                                        autocomplete="new-password" minlength="8" required>
                                    <span class="login-input-icon"><i class="fa-solid fa-lock"></i></span>
                                    <button type="button" class="login-toggle-password" id="toggleOldPassword"
                                        aria-label="Show password">
                                        <i class="fa-regular fa-eye"></i>
                                    </button>
                                </div>
                            </div>
                            <div class="login-field-group">
                                <label class="login-field-label" for="newPassword">Enter new password</label>
                                <div class="login-input-wrapper phone-input-wrapper">
                                    <input type="password" id="newPassword" class="login-input" placeholder="••••••"
                                        autocomplete="new-password" minlength="8" required>
                                    <span class="login-input-icon"><i class="fa-solid fa-lock"></i></span>
                                    <button type="button" class="login-toggle-password" id="toggleNewPassword"
                                        aria-label="Show password">
                                        <i class="fa-regular fa-eye"></i>
                                    </button>
                                </div>
                            </div>

                            <!-- Confirm Password Field -->
                            <div class="login-field-group">
                                <label class="login-field-label" for="confirmNewPassword">Confirm new password</label>
                                <div class="login-input-wrapper phone-input-wrapper">
                                    <input type="password" id="confirmNewPassword" class="login-input"
                                        placeholder="••••••" autocomplete="new-password" required>
                                    <span class="login-input-icon"><i class="fa-solid fa-lock"></i></span>
                                    <button type="button" class="login-toggle-password" id="toggleConfirmNewPassword"
                                        aria-label="Show password confirmation">
                                        <i class="fa-regular fa-eye-slash"></i>
                                    </button>
                                </div>
                            </div>

                            <!-- Submit Button -->
                            <div class="d-flex justify-content-between gap-4 mt-5">
                                <button type="button" class="btn btn-blue flex-grow-1">
                                    Reset Password
                                </button>
                                <button type="button" class="btn btn-orange-outlined flex-grow-1">
                                    Cancel
                                </button>
                            </div>

                        </form>

                    </div>
                </div>

            </div>

        </main>
